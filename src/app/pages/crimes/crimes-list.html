<div class="cases-container">
  <div class="header">
    <h1>Crimes</h1>
  </div>

  <div *ngIf="isLoading" class="loading-shade">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <table mat-table [dataSource]="data" class="mat-elevation-z0" *ngIf="!isLoading">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Crime ID</th>
      <td mat-cell *matCellDef="let c">#{{c.crime_id}}</td>
    </ng-container>

    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Crime Type</th>
      <td mat-cell *matCellDef="let c"><strong>{{c.crime_type}}</strong></td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef>Location</th>
      <td mat-cell *matCellDef="let c">{{c.location}}</td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Crime Date</th>
      <td mat-cell *matCellDef="let c">{{c.crime_date | date:'mediumDate'}}</td>
    </ng-container>

    <ng-container matColumnDef="severity">
      <th mat-header-cell *matHeaderCellDef>Severity</th>
      <td mat-cell *matCellDef="let c">
        <span [style.color]="c.severity === 'High' ? '#d32f2f' : c.severity === 'Medium' ? '#f57c00' : '#388e3c'"
              [style.background-color]="c.severity === 'High' ? 'rgba(244,67,54,0.1)' : c.severity === 'Medium' ? 'rgba(255,152,0,0.1)' : 'rgba(76,175,80,0.1)'"
              style="padding: 4px 10px; border-radius: 4px; font-weight: 600; font-size: 12px;">
          {{c.severity}}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let c">{{c.status}}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>

  <div *ngIf="!isLoading && data.length === 0" style="padding: 40px; text-align: center; color: gray;">
    <p>No crimes found.</p>
  </div>
</div>
