<div class="cases-container">
  <div class="header">
    <h1>Case Management</h1>
    <button mat-flat-button color="primary" routerLink="/cases/new">
      <mat-icon>add</mat-icon> NEW CASE
    </button>
  </div>

  <div *ngIf="isLoading" class="loading-shade">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <table mat-table [dataSource]="data" class="mat-elevation-z0" *ngIf="!isLoading">
    
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> Case ID </th>
      <td mat-cell *matCellDef="let case"> #{{case.case_id}} </td>
    </ng-container>

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Title </th>
      <td mat-cell *matCellDef="let case"> 
        <strong>{{case.case_title}}</strong>
      </td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef> Location </th>
      <td mat-cell *matCellDef="let case"> {{case.crime?.location || 'Unknown'}} </td>
    </ng-container>

    <ng-container matColumnDef="officer">
      <th mat-header-cell *matHeaderCellDef> Officer </th>
      <td mat-cell *matCellDef="let case"> 
        <div style="display: flex; align-items: center; gap: 8px;">
          <mat-icon style="font-size: 18px; width: 18px; height: 18px;">person</mat-icon>
          {{case.officer?.full_name || 'Unassigned'}}
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let case">
        <span [style.color]="case.case_status === 'Open' ? '#d32f2f' : '#388e3c'" 
              [style.background-color]="case.case_status === 'Open' ? 'rgba(244, 67, 54, 0.1)' : 'rgba(76, 175, 80, 0.1)'"
              style="padding: 4px 8px; border-radius: 4px; font-weight: 500;">
          {{case.case_status}}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let case">
        <button mat-icon-button color="primary" [routerLink]="['/cases', case.case_id]">
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>
  
  <div *ngIf="!isLoading && data.length === 0" 
       style="padding: 40px; text-align: center; color: gray;">
    <p>No cases found.</p>
  </div>
</div>
